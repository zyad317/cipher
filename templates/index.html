<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CipherLab — Classical Cryptography Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@300;400;700&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

  :root {
    --bg: #050508;
    --side-bg: #08080c;
    --accent: #00f2ff;
    --accent-glow: rgba(0, 242, 255, 0.4);
    --accent2: #7d2ae8;
    --accent2-glow: rgba(125, 42, 232, 0.4);
    --text: #ffffff;
    --text-dim: #808090;
    --border: rgba(255, 255, 255, 0.05);
    --glass: blur(25px) saturate(180%);
    --font-display: 'Syncopate', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'Plus Jakarta Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* Custom Cursor */
  #cursor {
    width: 20px; height: 20px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 10000;
    transition: transform 0.1s ease;
    mix-blend-mode: difference;
  }

  /* Dynamic Background */
  .bg-animation {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
  }

  .bg-circle {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--accent2-glow) 0%, transparent 70%);
    filter: blur(100px);
    animation: orbit 30s linear infinite;
  }

  @keyframes orbit {
    0% { transform: translate(-50%, -50%) rotate(0deg) translateX(200px) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg) translateX(200px) rotate(-360deg); }
  }

  /* Layout Structure */
  .sidebar {
    width: 320px;
    background: var(--side-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 40px 0;
    z-index: 10;
  }

  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 60px;
    position: relative;
  }

  /* Sidebar Branding */
  .brand {
    padding: 0 30px 40px;
    border-bottom: 1px solid var(--border);
  }

  .brand h1 {
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 5px;
  }

  .brand p {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Algorithm Menu */
  .menu-label {
    padding: 30px 30px 15px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-dim);
    font-weight: 800;
  }

  .algo-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 15px;
  }

  .algo-item {
    width: 100%;
    background: transparent;
    border: none;
    padding: 18px 20px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 15px;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    text-align: left;
    border-radius: 12px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .algo-item:hover {
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
    padding-left: 25px;
  }

  .algo-item.active {
    background: linear-gradient(90deg, rgba(0, 242, 255, 0.1), transparent);
    color: var(--accent);
    border-left: 3px solid var(--accent);
    padding-left: 25px;
  }

  .algo-icon {
    width: 32px; height: 32px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    transition: 0.3s;
  }

  .algo-item.active .algo-icon {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 15px var(--accent-glow);
  }

  /* Main Area Styling */
  .header-area {
    margin-bottom: 50px;
  }

  .algo-badge {
    display: inline-block;
    padding: 6px 15px;
    background: rgba(0, 242, 255, 0.1);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 10px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .main-title {
    font-family: var(--font-display);
    font-size: 40px;
    margin-bottom: 15px;
    background: linear-gradient(to right, #fff, #a0a0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .main-desc {
    font-size: 16px;
    color: var(--text-dim);
    max-width: 700px;
    line-height: 1.8;
  }

  /* Workstation Panel */
  .workstation {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 30px;
  }

  .panel-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    backdrop-filter: var(--glass);
  }

  .input-section {
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .form-group label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 15px;
    display: block;
  }

  textarea, input {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    border-radius: 16px;
    color: #fff;
    padding: 20px;
    width: 100%;
    font-family: var(--font-body);
    font-size: 15px;
    transition: 0.3s;
  }

  textarea:focus, input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.05);
  }

  .mode-switch {
    display: flex;
    background: rgba(255, 255, 255, 0.03);
    padding: 6px;
    border-radius: 14px;
    gap: 5px;
  }

  .mode-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px;
    border-radius: 10px;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 12px;
    cursor: none;
    transition: 0.3s;
  }

  .mode-btn.active {
    background: #fff;
    color: #000;
  }

  .run-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 22px;
    border-radius: 18px;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-top: 20px;
    transition: all 0.4s;
  }

  .run-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 20px 40px rgba(0, 242, 255, 0.2);
  }

  /* Output Screen */
  .output-screen {
    background: #000;
    border-radius: 20px;
    padding: 30px;
    height: 100%;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .screen-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .screen-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
  }

  .output-content {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 18px;
    color: var(--accent);
    line-height: 1.6;
    overflow-wrap: break-word;
  }

  .copy-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 11px;
    font-family: var(--font-mono);
    margin-top: 20px;
    display: none;
  }

  .copy-btn.show { display: block; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; }

  @media (max-width: 1100px) {
    .workstation { grid-template-columns: 1fr; }
    .sidebar { width: 80px; }
    .brand, .menu-label, .algo-item span { display: none; }
    .algo-item { justify-content: center; padding: 15px; }
  }
</style>
</head>
<body>
<div id="cursor"></div>
<div class="bg-animation">
  <div class="bg-circle" style="top: 20%; left: 30%;"></div>
  <div class="bg-circle" style="top: 70%; left: 80%; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);"></div>
</div>

<aside class="sidebar">
  <div class="brand">
    <h1>CIPHERLAB</h1>
    <p>Quantum-Safe Protocol V2.0</p>
  </div>
  
  <div class="menu-label">Algorithms</div>
  <nav class="algo-list" id="algo-menu">
    <!-- Will be populated by JS -->
  </nav>
</aside>

<main class="main-content">
  <div class="header-area animate-in">
    <span class="algo-badge" id="algo-type-badge">SUBSTITUTION_MODE</span>
    <h2 class="main-title" id="algo-title">CAESAR CIPHER</h2>
    <p class="main-desc" id="algo-desc">Shifts each letter by a fixed number of positions in the alphabet. Simple but iconic.</p>
  </div>

  <div class="workstation">
    <div class="panel-card animate-in" style="animation-delay: 0.1s;">
      <div class="input-section">
        <div class="form-group">
          <label>Operational Mode</label>
          <div class="mode-switch">
            <button class="mode-btn active" id="mode-encode" onclick="setMode('encode')">ENCRYPT</button>
            <button class="mode-btn" id="mode-decode" onclick="setMode('decode')">DECRYPT</button>
          </div>
        </div>

        <div id="fields-container"></div>

        <div class="form-group">
          <label>Raw Input Stream</label>
          <textarea id="input-text" placeholder="Enter plaintext..." rows="5"></textarea>
        </div>

        <button class="run-btn" id="exec-btn" onclick="execute()">INITIATE_PROCESS</button>
      </div>
    </div>

    <div class="panel-card animate-in" style="animation-delay: 0.2s; padding: 10px;">
      <div class="output-screen">
        <div class="screen-header">
          <div style="display: flex; gap: 8px;">
            <div class="screen-dot" style="background: #ff5f56;"></div>
            <div class="screen-dot" style="background: #ffbd2e;"></div>
            <div class="screen-dot" style="background: #27c93f;"></div>
          </div>
          <div style="font-family: var(--font-mono); font-size: 10px; color: #444;">TERMINAL_V2.0</div>
        </div>
        <div class="output-content" id="output-text">SYSTEM READY. AWAITING PLAINTEXT...</div>
        <button class="copy-btn" id="copy-btn" onclick="copyResult()">COPY_OUTPUT</button>
      </div>
    </div>
  </div>
</main>

<script>
const ALGOS = {
  caesar: {
    title: 'CAESAR CIPHER',
    desc: 'Shifts each letter by a fixed number of positions in the alphabet. One of the oldest and simplest substitution ciphers.',
    type: 'classical',
    typeLabel: 'Substitution',
    keyRequired: false,
    fields: [
      { id: 'shift', label: 'Shift Amount', type: 'number', placeholder: '3', default: '3', extra: true }
    ]
  },
  autokey: {
    title: 'AUTO-KEY CIPHER',
    desc: 'A polyalphabetic cipher where the key is derived from the plaintext itself after an initial keyword.',
    type: 'classical',
    typeLabel: 'Polyalphabetic',
    keyRequired: true,
    fields: [
      { id: 'key', label: 'Key', type: 'text', placeholder: 'e.g. QUEENLY', default: '' }
    ]
  },
  vigenere: {
    title: 'VIGENÈRE CIPHER',
    desc: 'A polyalphabetic substitution cipher using a keyword to shift letters, significantly stronger than Caesar.',
    type: 'classical',
    typeLabel: 'Polyalphabetic',
    keyRequired: true,
    fields: [
      { id: 'key', label: 'Keyword', type: 'text', placeholder: 'e.g. SECRET', default: '' }
    ]
  },
  playfair: {
    title: 'PLAYFAIR CIPHER',
    desc: 'Encrypts pairs of letters using a 5×5 key matrix. The first practical digraph substitution cipher.',
    type: 'classical',
    typeLabel: 'Digraph Substitution',
    keyRequired: true,
    fields: [
      { id: 'key', label: 'Keyword', type: 'text', placeholder: 'e.g. MONARCHY', default: 'MONARCHY' }
    ]
  },
  hill: {
    title: 'HILL CIPHER',
    desc: 'A polygraphic cipher using linear algebra. Encrypts blocks of letters via matrix multiplication modulo 26.',
    type: 'classical',
    typeLabel: 'Polygraphic',
    keyRequired: true,
    fields: [
      { id: 'key', label: 'Key Matrix (as text)', type: 'text', placeholder: 'e.g. GYBNQKURP', default: 'GYBNQKURP' }
    ]
  },
  monoalphabetic: {
    title: 'MONOALPHABETIC CIPHER',
    desc: 'Maps each letter to a fixed substitute using a shuffled alphabet. Simple but vulnerable to frequency analysis.',
    type: 'classical',
    typeLabel: 'Substitution',
    keyRequired: false,
    fields: []
  },
  railfence: {
    title: 'RAIL FENCE CIPHER',
    desc: 'A transposition cipher that writes text in a zigzag pattern across multiple "rails" then reads off row by row.',
    type: 'transposition',
    typeLabel: 'Transposition',
    keyRequired: false,
    fields: [
      { id: 'rails', label: 'Number of Rails', type: 'number', placeholder: '3', default: '3', extra: true }
    ]
  },
  rowtransposition: {
    title: 'ROW TRANSPOSITION',
    desc: 'Writes plaintext into rows and reads columns in a key-specified order. A classic transposition technique.',
    type: 'transposition',
    typeLabel: 'Transposition',
    keyRequired: true,
    fields: [
      { id: 'key', label: 'Key (digits or word)', type: 'text', placeholder: 'e.g. 4312567', default: '4312567' }
    ]
  },
  des: {
    title: 'DES ALGORITHM',
    desc: 'Data Encryption Standard — a symmetric-key block cipher. Processes 64-bit blocks with a 64-bit hex key. Note: plaintext must contain letters only (spaces are stripped automatically; digits and symbols are not supported).',
    type: 'symmetric',
    typeLabel: 'Block Cipher',
    keyRequired: true,
    modeNote: 'Encode only',
    fields: [
      { id: 'key', label: 'Key (Hex or Alpha)', type: 'text', placeholder: 'e.g. 133457799BBCDFF1', default: '133457799BBCDFF1' }
    ]
  }
};

let currentAlgo = 'caesar';
let currentMode = 'encode';

// Populate Sidebar
function initMenu() {
  const menu = document.getElementById('algo-menu');
  menu.innerHTML = Object.entries(ALGOS).map(([id, algo]) => `
    <button class="algo-item ${id === currentAlgo ? 'active' : ''}" data-algo="${id}" onclick="selectAlgo(this)">
      <div class="algo-icon">${id.charAt(0).toUpperCase()}</div>
      <span>${algo.title.split(' ')[0]}</span>
    </button>
  `).join('');
}

function selectAlgo(btn) {
  document.querySelectorAll('.algo-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentAlgo = btn.dataset.algo;
  renderAlgo();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-encode').classList.toggle('active', mode === 'encode');
  document.getElementById('mode-decode').classList.toggle('active', mode === 'decode');
}

function renderAlgo() {
  const algo = ALGOS[currentAlgo];
  const titleEl = document.getElementById('algo-title');
  const descEl = document.getElementById('algo-desc');
  const badgeEl = document.getElementById('algo-type-badge');
  const outputText = document.getElementById('output-text');
  const copyBtn = document.getElementById('copy-btn');

  // Reset Output Screen
  outputText.textContent = 'SYSTEM READY. AWAITING PLAINTEXT...';
  outputText.style.color = 'var(--accent)';
  copyBtn.className = 'copy-btn';

  // Clear Input Stream
  document.getElementById('input-text').value = '';

  // Smooth transition
  [titleEl, descEl].forEach(el => {
    el.style.opacity = 0;
    el.style.transform = 'translateY(10px)';
  });

  setTimeout(() => {
    titleEl.textContent = algo.title;
    descEl.textContent = algo.desc;
    badgeEl.textContent = algo.typeLabel.toUpperCase() + '_MODE';
    
    [titleEl, descEl].forEach(el => {
      el.style.opacity = 1;
      el.style.transform = 'translateY(0)';
      el.style.transition = '0.5s cubic-bezier(0.16, 1, 0.3, 1)';
    });
  }, 200);

  // Fields
  const container = document.getElementById('fields-container');
  if (algo.fields.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = algo.fields.map(f => `
    <div class="form-group">
      <label>${f.label}</label>
      <input type="${f.type}" id="field-${f.id}" placeholder="${f.placeholder}" value="${f.default}">
    </div>
  `).join('');
}

async function execute() {
  const algo = ALGOS[currentAlgo];
  const text = document.getElementById('input-text').value.trim();
  if (!text) { showOutput('SYSTEM_ALERT: Plaintext required.', true); return; }

  const payload = { algorithm: currentAlgo, mode: currentMode, text, key: '', extra: {} };

  algo.fields.forEach(f => {
    const val = document.getElementById(`field-${f.id}`)?.value || f.default;
    if (f.extra) payload.extra[f.id] = val;
    else payload[f.id] = val;
  });

  const btn = document.getElementById('exec-btn');
  btn.classList.add('loading');
  btn.innerHTML = 'PROCESSING...';

  try {
    const res = await fetch('/api/cipher', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.error) showOutput('PROCESS_FAILED: ' + data.error, true);
    else showOutput(data.result, false);
  } catch (e) {
    showOutput('COMMS_FAILURE: ' + e.message, true);
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = 'INITIATE_PROCESS';
  }
}

function showOutput(text, isError) {
  const out = document.getElementById('output-text');
  const copyBtn = document.getElementById('copy-btn');
  
  out.innerHTML = '';
  const prefix = isError ? '![ERROR]: ' : 'CIPHER: ';
  const fullText = prefix + text;
  
  let i = 0;
  function typeWriter() {
    if (i < fullText.length) {
      out.innerHTML += fullText.charAt(i);
      i++;
      setTimeout(typeWriter, 10);
    }
  }
  typeWriter();

  out.style.color = isError ? '#ff5f56' : 'var(--accent)';
  copyBtn.className = 'copy-btn' + (!isError ? ' show' : '');
}

function copyResult() {
  const text = document.getElementById('output-text').textContent.replace('CIPHER: ', '');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'COPIED_SUCCESS';
    setTimeout(() => btn.textContent = 'COPY_OUTPUT', 1500);
  });
}

// Cursor Follower
document.addEventListener('mousemove', e => {
  const cursor = document.getElementById('cursor');
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// Init
initMenu();
renderAlgo();
</script>
</body>
</html>
